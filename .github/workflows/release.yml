name: Release

# Se activa al crear un tag vX.Y.Z (ej: git tag v1.0.0 && git push --tags)
on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # ─── 1. Backend: build + push imagen Docker ───────────────────────────────
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Tests backend
        run: mvn -f ./backend/pom.xml clean test
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          OPENROUTER_GEMMA_API_KEY: ${{ secrets.OPENROUTER_GEMMA_KEY }}
          OPENROUTER_DEEPSEEK_API_KEY: ${{ secrets.OPENROUTER_DEEPSEEK_KEY }}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nutrifit-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nutrifit-backend:${{ github.ref_name }}

  # ─── 2. Cliente: instaladores nativos en matriz Windows / Linux / macOS ───
  build-installers:
    name: Instalador ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            installer-ext: exe
          - os: ubuntu-latest
            installer-ext: deb
          - os: macos-latest
            installer-ext: dmg

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Apuntar el cliente al backend desplegado en producción
      - name: Configurar URL del backend
        shell: bash
        run: |
          echo "backend.url=${{ secrets.BACKEND_PRODUCTION_URL }}" \
            > client/src/main/resources/config.properties

      - name: Build fat JAR
        run: mvn -f ./client/pom.xml clean package -DskipTests

      - name: Generar instalador con jpackage
        run: mvn -f ./client/pom.xml jpackage:jpackage

      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: NutriFit-${{ matrix.os }}
          path: client/target/installer/*.{exe,deb,dmg,pkg,msi}
          if-no-files-found: warn

  # ─── 3. GitHub Release con todos los instaladores adjuntos ────────────────
  publish-release:
    name: Publicar GitHub Release
    needs: [deploy-backend, build-installers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Descargar todos los instaladores
        uses: actions/download-artifact@v4
        with:
          path: installers/

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NutriFit ${{ github.ref_name }}
          body: |
            ## NutriFit ${{ github.ref_name }}

            ### Instalación

            | Sistema | Archivo |
            |---------|---------|
            | Windows | `NutriFit-${{ github.ref_name }}.exe` |
            | Linux   | `NutriFit-${{ github.ref_name }}.deb` |
            | macOS   | `NutriFit-${{ github.ref_name }}.dmg` |

            El instalador incluye el JRE — no hace falta instalar Java.
            La app se conecta automáticamente al servidor de producción.
          files: installers/**/*
