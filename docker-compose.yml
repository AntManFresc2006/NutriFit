services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutrifit
      POSTGRES_USER: nutrifit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrifit}
    volumes:
      - nutrifit_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrifit -d nutrifit"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/nutrifit
      SPRING_DATASOURCE_USERNAME: nutrifit
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nutrifit}
      OPENROUTER_GEMMA_API_KEY: ${OPENROUTER_GEMMA_API_KEY:-}
      OPENROUTER_DEEPSEEK_API_KEY: ${OPENROUTER_DEEPSEEK_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  nutrifit_db_data:
