services:

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootsecret
      MARIADB_DATABASE: nutrifit
      MARIADB_USER: nutrifit
      MARIADB_PASSWORD: nutrifit
    volumes:
      - nutrifit_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/nutrifit
      SPRING_DATASOURCE_USERNAME: nutrifit
      SPRING_DATASOURCE_PASSWORD: nutrifit
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
    depends_on:
      db:
        condition: service_healthy

volumes:
  nutrifit_db_data:
