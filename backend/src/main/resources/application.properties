# Spring Boot backend - shared configuration
# Secrets via env vars. Never commit real credentials here.

spring.main.banner-mode=off

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nutrifit}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nutrifit}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nutrifit}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

openrouter.gemma.api.key=${OPENROUTER_GEMMA_API_KEY:PLACEHOLDER}
openrouter.deepseek.api.key=${OPENROUTER_DEEPSEEK_API_KEY:PLACEHOLDER}
